name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend · pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      # conftest.py forțează DATABASE_URL folosind TEST_DB_HOST; in CI,
      # postgres service-ul e pe localhost, nu pe "db" (default-ul din docker-compose).
      TEST_DB_HOST: localhost
      APP_ENV: test
      JWT_SECRET: test-secret-fixed-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run pytest
        working-directory: backend
        run: pytest -q

  frontend-tests:
    name: Frontend · vitest + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Run vitest
        working-directory: frontend
        run: npm test
      - name: Type check + production build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker · prod images build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend prod image
        run: docker build -f backend/Dockerfile.prod -t adeplast-saas-backend:ci backend/
      - name: Build frontend prod image
        run: docker build -f frontend/Dockerfile.prod -t adeplast-saas-frontend:ci frontend/
